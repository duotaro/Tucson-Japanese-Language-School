name: 🚀 Deploy to Cloudflare Pages

on:
  push:
    branches: [develop] #[main, develop]
  workflow_dispatch:
    inputs:
      cache_strategy:
        description: 'キャッシュ更新戦略'
        required: true
        default: 'moderate'
        type: choice
        options:
          - full
          - frequent
          - moderate

env:
  NODE_VERSION: '18'
  YARN_VERSION: '4.2.2'

jobs:
  deploy-cloudflare:
    name: 🚀 Build & Deploy to Cloudflare
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: 📦 Setup Yarn
        run: |
          npm install -g yarn@${{ env.YARN_VERSION }}
          yarn --version

      - name: 🔄 Cache node_modules
        uses: actions/cache@v3
        with:
          path: |
            node_modules
            .yarn/cache
          key: ${{ runner.os }}-yarn-${{ hashFiles('package.json', 'yarn.lock') }}
          restore-keys: |
            ${{ runner.os }}-yarn-

      - name: 📦 Install dependencies
        run: yarn install --frozen-lockfile

      - name: 🔄 Notion キャッシュ更新
        env:
          NEXT_PUBLIC_NOTION_DATABASE_ID: ${{ secrets.NEXT_PUBLIC_NOTION_DATABASE_ID }}
          NEXT_PUBLIC_NOTION_NEWS_DATABASE_ID: ${{ secrets.NEXT_PUBLIC_NOTION_NEWS_DATABASE_ID }}
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
        run: |
          mkdir -p cache/notion-data

          if [ "${{ github.event.inputs.cache_strategy }}" != "" ]; then
            STRATEGY="${{ github.event.inputs.cache_strategy }}"
          elif [ "${{ github.ref }}" = "refs/heads/main" ]; then
            STRATEGY="full"
          else
            STRATEGY="moderate"
          fi

          echo "🎯 キャッシュ更新戦略: $STRATEGY"

          if [ -z "$NOTION_TOKEN" ]; then
            echo "⚠️ NOTION_TOKEN が設定されていません。モックデータを使用します。"
            yarn cache:mock
          else
            case $STRATEGY in
              "full")
                yarn cache:fetch-all
                ;;
              "frequent"|"moderate")
                yarn cache:update:$STRATEGY
                ;;
            esac
          fi

      - name: 🏗️ Next.js ビルド
        run: |
          echo "🏗️ ビルドを開始..."
          yarn build
          echo "✅ ビルドが完了しました"

      - name: 📊 ビルド結果確認
        run: |
          if [ -d "out" ]; then
            echo "✅ Static export 成功"
            echo "📊 生成ページ数: $(find out/ -name '*.html' | wc -l)"
            echo "📦 サイズ: $(du -sh out/ | cut -f1)"
          else
            echo "❌ Static export 失敗"
            exit 1
          fi

      - name: 🚀 Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy out --project-name=tucson-japanese-language-school --commit-dirty=true

      - name: 📊 デプロイ結果レポート
        if: always()
        run: |
          echo "## 🎯 Cloudflare Pages デプロイ結果" >> $GITHUB_STEP_SUMMARY
          echo "| 項目 | 状況 |" >> $GITHUB_STEP_SUMMARY
          echo "|------|------|" >> $GITHUB_STEP_SUMMARY
          echo "| ブランチ | ${{ github.ref_name }} |" >> $GITHUB_STEP_SUMMARY
          echo "| コミット | ${{ github.sha }} |" >> $GITHUB_STEP_SUMMARY

          if [ -d "out" ]; then
            PAGE_COUNT=$(find out/ -name "*.html" | wc -l)
            echo "| 生成ページ数 | $PAGE_COUNT |" >> $GITHUB_STEP_SUMMARY
          fi
